# Production deployment for the Go yandex2mqtt service.
#
# Deployment-specific values (domain, MQTT host, secrets) live in .env — see
# .env.example. The nginx-proxy + letsencrypt companion route your public
# domain to this container via VIRTUAL_HOST / VIRTUAL_PORT / LETSENCRYPT_HOST
# (all supplied through .env). The data volume holds devices.yaml and the
# SQLite DB.
services:
  yandex2mqtt:
    build: .
    image: yandex2mqtt-go:latest
    container_name: ya2mqtt
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - WEB_BEHIND_PROXY=true
      - WEB_PORT=80
      - DEVICES_FILE=/app/data/devices.yaml
      - DB_PATH=/app/data/yandex2mqtt.db
    volumes:
      - ${DATA_DIR:-./data}:/app/data
    networks:
      - smarthome
      - proxy-tier

# External networks are created by the broker/proxy stacks; set their real
# names here to match your environment.
networks:
  smarthome:
    external: true
  proxy-tier:
    external: true
