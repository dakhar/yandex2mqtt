{{define "content"}}
<div class="topbar">
  <span class="brand">yandex2mqtt · {{if .EditID}}редактирование устройства{{else}}новое устройство{{end}}</span>
  <span><a href="/app">← к доске</a> <a href="/logout">выйти</a></span>
</div>

{{if .Device}}<div id="device-data" style="display:none">{{.Device}}</div>{{end}}

<div class="wrap builder">
  <div id="errors" class="err" style="display:none"></div>

  <section class="meta">
    <label>Название</label>
    <input id="name" type="text" placeholder="Например, Свет на кухне">
    <label>Тип устройства</label>
    <select id="type"></select>
    <label>Комната</label>
    <select id="room">
      <option value="">— без комнаты —</option>
      {{range .Rooms}}<option value="{{.ID}}">{{.Name}}</option>{{end}}
    </select>
    <label>Описание (необязательно)</label>
    <input id="description" type="text">
  </section>

  <section>
    <h2>Умения (capabilities)</h2>
    <div id="capabilities"></div>
    <button type="button" class="add" onclick="addRow('cap')">+ умение</button>
  </section>

  <section>
    <h2>Свойства (properties)</h2>
    <div id="properties"></div>
    <button type="button" class="add" onclick="addRow('prop')">+ свойство</button>
  </section>

  <div class="actions">
    <button type="button" class="primary" onclick="save()">{{if .EditID}}Сохранить{{else}}Создать устройство{{end}}</button>
  </div>
</div>

<style>
  .builder { max-width: 780px; }
  .builder section { background:#fff; border-radius:12px; padding:16px 18px; margin-bottom:16px;
                     box-shadow:0 1px 3px rgba(0,0,0,.06); }
  .builder label { display:block; font-size:13px; color:#555; margin:10px 0 4px; }
  .builder input[type=text], .builder input[type=number], .builder select {
     width:100%; box-sizing:border-box; padding:8px 10px; border:1px solid #d0d3d9; border-radius:8px; font-size:14px; }
  .row { border:1px solid #e6e8eb; border-radius:10px; padding:12px; margin-bottom:12px; position:relative; }
  .row .grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .row .rm { position:absolute; top:8px; right:10px; border:0; background:transparent; color:#c0392b; cursor:pointer; font-size:16px; }
  .add { background:#eef0f3; border:1px dashed #b3b8bf; border-radius:8px; padding:8px 14px; cursor:pointer; }
  .primary { background:#ffcc00; border:0; border-radius:8px; padding:11px 20px; font-weight:600; cursor:pointer; font-size:15px; }
  .actions { margin-bottom:40px; }
  .hint { font-size:11px; color:#8a8f98; }
  .modes { display:flex; flex-wrap:wrap; gap:6px; max-height:120px; overflow:auto; }
  .modes label { display:flex; align-items:center; gap:4px; font-size:12px; margin:0; }
  .modes input { width:auto; }
  .map { margin-top:8px; border-top:1px dashed #e6e8eb; padding-top:8px; }
  .map .pair { display:grid; grid-template-columns:1fr 1fr auto; gap:6px; margin-bottom:6px; }
  .map .pair button { border:0; background:transparent; color:#c0392b; cursor:pointer; }
  .map .addpair { font-size:12px; }
</style>

<script>
let SCHEMA = null;
const capIndex = { cap: 0, prop: 0 };
const EDIT_ID = "{{.EditID}}";

const dd = document.getElementById('device-data');
const DEVICE = dd ? JSON.parse(dd.textContent) : null;

fetch('/app/schema').then(r => r.json()).then(s => {
  SCHEMA = s;
  const typeSel = document.getElementById('type');
  s.device_types.forEach(t => typeSel.add(new Option(t, t)));
  if (DEVICE) prefill(DEVICE);
});

function defsFor(kind) { return kind === 'cap' ? SCHEMA.capabilities : SCHEMA.properties; }

function prefill(d) {
  document.getElementById('name').value = d.name || '';
  document.getElementById('type').value = d.type || '';
  document.getElementById('room').value = d.room_id || '';
  document.getElementById('description').value = d.description || '';
  (d.capabilities || []).forEach(c => addRow('cap', c));
  (d.properties || []).forEach(p => addRow('prop', p));
}

function addRow(kind, data) {
  const id = kind + (capIndex[kind]++);
  const row = document.createElement('div');
  row.className = 'row';
  row.dataset.kind = kind;
  row.id = id;
  const cur = data ? data.type : defsFor(kind)[0].type;
  const typeOpts = defsFor(kind).map(d => `<option value="${d.type}"${d.type === cur ? ' selected' : ''}>${d.type}</option>`).join('');
  row.innerHTML = `
    <button class="rm" onclick="this.parentNode.remove()">×</button>
    <label>Тип</label>
    <select onchange="renderParams('${id}')">${typeOpts}</select>
    <div class="params"></div>`;
  document.getElementById(kind === 'cap' ? 'capabilities' : 'properties').appendChild(row);
  renderParams(id, data);
}

function renderParams(rowId, data) {
  const row = document.getElementById(rowId);
  const kind = row.dataset.kind;
  const type = row.querySelector('select').value;
  const def = defsFor(kind).find(d => d.type === type);
  const p = row.querySelector('.params');
  const actType = type.split('.')[2];
  const d = data || {};
  const dParams = d.params || {};
  const wantInst = d.instance || dParams.instance || def.instances[0];

  const instanceSel = def.instances.map(i => `<option value="${i}"${i === wantInst ? ' selected' : ''}>${i}</option>`).join('');
  let html = `<label>Instance</label><select class="f-instance" onchange="renderParams('${rowId}')">${instanceSel}</select>`;
  const inst = row.querySelector('.f-instance') ? row.querySelector('.f-instance').value : wantInst;

  if (def.units && def.units[inst]) {
    const cur = dParams.unit || '';
    html += `<label>Единица</label><select class="f-unit"><option value="">—</option>` +
            def.units[inst].map(x => `<option value="${x}"${x === cur ? ' selected' : ''}>${x}</option>`).join('') + `</select>`;
  }
  if (actType === 'range') {
    const rg = dParams.range || {};
    html += `<div class="grid"><div><label>min</label><input type="number" class="f-min" value="${valOr(rg.min, 0)}"></div>
             <div><label>max</label><input type="number" class="f-max" value="${valOr(rg.max, 100)}"></div>
             <div><label>precision</label><input type="number" class="f-prec" value="${valOr(rg.precision, 1)}"></div></div>`;
  }
  if (actType === 'mode') {
    const set = new Set((dParams.modes || []).map(m => m.value));
    html += `<label>Режимы</label><div class="modes">` +
            SCHEMA.mode_values.map(m => `<label><input type="checkbox" class="f-mode" value="${m}"${set.has(m) ? ' checked' : ''}>${m}</label>`).join('') + `</div>`;
  }
  if (actType === 'event' && def.events && def.events[inst]) {
    const set = new Set((dParams.events || []).map(m => m.value));
    html += `<label>События</label><div class="modes">` +
            def.events[inst].map(m => `<label><input type="checkbox" class="f-event" value="${m}"${set.has(m) ? ' checked' : ''}>${m}</label>`).join('') + `</div>`;
  }
  if (actType === 'color_setting' && inst === 'temperature_k') {
    const tk = dParams.temperature_k || {};
    html += `<div class="grid"><div><label>K min</label><input type="number" class="f-min" value="${valOr(tk.min, 2700)}"></div>
             <div><label>K max</label><input type="number" class="f-max" value="${valOr(tk.max, 6500)}"></div></div>`;
  }
  html += `<label>MQTT state-топик</label><input type="text" class="f-state" value="${attr(d.state)}" placeholder="yandex/Device/state">`;
  if (kind === 'cap') {
    html += `<label>MQTT set-топик</label><input type="text" class="f-set" value="${attr(d.set)}" placeholder="yandex/Device/set">`;
  }
  html += `<label class="hint"><input type="checkbox" class="f-retr"${d.retrievable !== false ? ' checked' : ''}> retrievable · <input type="checkbox" class="f-rep"${d.reportable !== false ? ' checked' : ''}> reportable</label>`;

  if (kind === 'cap') {
    html += `<div class="map"><div class="hint">Маппинг значений Yandex↔MQTT (необязательно; true/false и числа определяются автоматически)</div>
             <div class="pairs"></div>
             <button type="button" class="add addpair" onclick="addPair('${rowId}')">+ пара</button></div>`;
  }
  p.innerHTML = html;

  (d.mapping || []).forEach(m => addPair(rowId, m.yandex, m.mqtt));
}

function addPair(rowId, yandex, mqtt) {
  const box = document.getElementById(rowId).querySelector('.pairs');
  if (!box) return;
  const div = document.createElement('div');
  div.className = 'pair';
  div.innerHTML = `<input type="text" class="p-y" placeholder="Yandex" value="${attr(fmt(yandex))}">
                   <input type="text" class="p-m" placeholder="MQTT" value="${attr(fmt(mqtt))}">
                   <button type="button" onclick="this.parentNode.remove()">×</button>`;
  box.appendChild(div);
}

function collect(kind) {
  const out = [];
  document.querySelectorAll('#' + (kind === 'cap' ? 'capabilities' : 'properties') + ' .row').forEach(row => {
    const type = row.querySelector('select').value;
    const actType = type.split('.')[2];
    const inst = row.querySelector('.f-instance').value;
    const params = {};
    if (['range', 'toggle', 'mode', 'float', 'event'].includes(actType)) params.instance = inst;
    const unit = row.querySelector('.f-unit');
    if (unit && unit.value) params.unit = unit.value;
    if (actType === 'range') params.range = { min: num(row, '.f-min'), max: num(row, '.f-max'), precision: num(row, '.f-prec') };
    if (actType === 'mode') params.modes = [...row.querySelectorAll('.f-mode:checked')].map(c => ({ value: c.value }));
    if (actType === 'event') params.events = [...row.querySelectorAll('.f-event:checked')].map(c => ({ value: c.value }));
    if (actType === 'color_setting') {
      if (inst === 'temperature_k') params.temperature_k = { min: num(row, '.f-min'), max: num(row, '.f-max') };
      else if (inst === 'hsv' || inst === 'rgb') params.color_model = inst;
    }
    const setEl = row.querySelector('.f-set');
    const item = {
      type, instance: inst,
      retrievable: row.querySelector('.f-retr').checked,
      reportable: row.querySelector('.f-rep').checked,
      params,
      set: setEl ? setEl.value.trim() : '',
      state: row.querySelector('.f-state').value.trim()
    };
    const pairs = [...row.querySelectorAll('.pair')].map(pr => ({
      yandex: parseVal(pr.querySelector('.p-y').value), mqtt: parseVal(pr.querySelector('.p-m').value)
    })).filter(p => p.yandex !== '' || p.mqtt !== '');
    if (pairs.length) item.mapping = pairs;
    out.push(item);
  });
  return out;
}

function parseVal(s) {
  s = (s || '').trim();
  if (s === 'true') return true;
  if (s === 'false') return false;
  if (s !== '' && !isNaN(Number(s))) return Number(s);
  return s;
}
function fmt(v) { return v === undefined || v === null ? '' : String(v); }
function attr(s) { return (s || '').replace(/"/g, '&quot;'); }
function valOr(v, d) { return v === undefined || v === null ? d : v; }
function num(row, sel) { const v = parseFloat(row.querySelector(sel).value); return isNaN(v) ? 0 : v; }

function save() {
  const payload = {
    name: document.getElementById('name').value.trim(),
    type: document.getElementById('type').value,
    room_id: document.getElementById('room').value,
    description: document.getElementById('description').value.trim(),
    capabilities: collect('cap'),
    properties: collect('prop')
  };
  const url = EDIT_ID ? '/app/devices/' + encodeURIComponent(EDIT_ID) : '/app/devices';
  fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
    .then(async r => {
      if (r.ok) { location.href = '/app'; return; }
      const data = await r.json().catch(() => ({ errors: ['ошибка ' + r.status] }));
      const box = document.getElementById('errors');
      box.style.display = 'block';
      box.innerHTML = (data.errors || ['ошибка']).join('<br>');
      window.scrollTo(0, 0);
    });
}
</script>
{{end}}
