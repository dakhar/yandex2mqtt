{{define "layout"}}<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>yandex2mqtt</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f4f5f7; margin: 0; }
    .card { max-width: 680px; margin: 8vh auto; background: #fff; padding: 28px 32px;
            border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    h1 { font-size: 20px; margin: 0 0 20px; }
    h2 { font-size: 16px; margin: 28px 0 12px; }
    table.users { width: 100%; border-collapse: collapse; font-size: 14px; }
    table.users th, table.users td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; }
    table.users th { color: #888; font-weight: 600; font-size: 12px; text-transform: uppercase; }
    form.create { max-width: 320px; }
    label.row { display: flex; align-items: center; gap: 8px; }
    label.row input { width: auto; }
    button.danger { background: #f8d7da; color: #842029; padding: 5px 10px; font-size: 13px; width: auto; }
    form[action*="delete"] { margin: 0; }
    label { display: block; font-size: 13px; color: #555; margin: 12px 0 4px; }
    input[type=text], input[type=password] { width: 100%; box-sizing: border-box; padding: 9px 11px;
            border: 1px solid #d0d3d9; border-radius: 8px; font-size: 14px; }
    button { margin-top: 20px; width: 100%; padding: 10px; border: 0; border-radius: 8px;
            background: #ffcc00; color: #1a1a1a; font-weight: 600; font-size: 14px; cursor: pointer; }
    .err { color: #c0392b; font-size: 13px; margin-top: 12px; }
    .muted { color: #888; font-size: 13px; }
    a { color: #3b5bdb; }
  </style>
</head>
<body>
  <div class="card">{{template "content" .}}</div>
</body>
</html>{{end}}
